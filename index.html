<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#050816">
  <title>SnakeSky</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="app-shell">

  <!-- =========================
       🟦 GAME FIRST
  ========================== -->
  <div class="canvas-wrap">
    <canvas id="game" aria-label="Snake game board"></canvas>
    <div class="canvas-glow"></div>
  </div>

  <!-- =========================
       🟦 CONTROLS
  ========================== -->
  <div class="controls">
    <button class="dir-btn up" data-dir="up">▲</button>

    <div class="mid-row">
      <button class="dir-btn" data-dir="left">◀</button>
      <button class="dir-btn" data-dir="down">▼</button>
      <button class="dir-btn" data-dir="right">▶</button>
    </div>
  </div>

  <!-- =========================
       🟦 ACTIONS
  ========================== -->
  <div class="actions">
    <button id="start" class="primary-btn">Start Game</button>
    <button id="share" class="secondary-btn">Share Run</button>
  </div>

  <!-- =========================
       🟣 ATPROTO WORLD STATE
       (NEW CORE IDEA)
  ========================== -->
  <section class="world-state">

    <h3 class="world-title">Last run</h3>

    <div class="world-card">
      <div id="world-user">@loading...</div>
      <div id="world-length">🐍 --</div>
      <div id="world-link"></div>
    </div>

  </section>

</main>

<script src="game.js"></script>

</body>
</html>
