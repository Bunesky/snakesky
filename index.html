<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050816" />
  <title>SnakeSky</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="brand">
        <span class="brand-badge">ATProto-ready</span>
        <h1>SnakeSky</h1>
      </div>

      <p class="subtitle">
      </p>
    </header>

    <section class="game-panel" aria-label="Snake game">
      <div class="canvas-wrap">
        <canvas id="game" aria-label="Snake game board"></canvas>
        <div class="canvas-glow" aria-hidden="true"></div>
      </div>

      <div class="stats">
        <div class="stat-card">
          <span class="stat-label">Length</span>
          <strong id="length">3</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">Apples</span>
          <strong id="apples">0</strong>
        </div>
        <div class="stat-card wide">
          <span class="stat-label">Status</span>
          <strong id="status">Ready to play.</strong>
        </div>
      </div>

      <div class="controls" aria-label="Direction controls">
        <button class="dir-btn up" data-dir="up" aria-label="Move up">▲</button>
        <div class="mid-row">
          <button class="dir-btn left" data-dir="left" aria-label="Move left">◀</button>
          <button class="dir-btn down" data-dir="down" aria-label="Move down">▼</button>
          <button class="dir-btn right" data-dir="right" aria-label="Move right">▶</button>
        </div>
      </div>

      <div class="actions">
        <button id="start" class="primary-btn">Start Game</button>
        <button id="share" class="secondary-btn">Share Run</button>
      </div>

      <p class="hint">
        Swipe on the board or use the arrows. Keyboard support is included too.
      </p>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
