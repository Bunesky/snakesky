<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#050816">
  <title>SnakeSky</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app-shell">

  <div class="canvas-wrap">
    <canvas id="game" aria-label="Snake game board"></canvas>
    <div class="canvas-glow"></div>
  </div>

  <div class="controls">
    <button class="dir-btn up" data-dir="up">▲</button>

    <div class="mid-row">
      <button class="dir-btn" data-dir="left">◀</button>
      <button class="dir-btn" data-dir="down">▼</button>
      <button class="dir-btn" data-dir="right">▶</button>
    </div>
  </div>

  <div class="actions">
    <button id="start" class="primary-btn">Start Game</button>
    <button id="share" class="secondary-btn">Share Run</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <span class="stat-label">Length</span>
      <strong id="length">3</strong>
    </div>

    <div class="stat-card">
      <span class="stat-label">Apples</span>
      <strong id="apples">0</strong>
    </div>

    <div class="stat-card wide">
      <span class="stat-label">Status</span>
      <strong id="status">Ready to play.</strong>
    </div>
  </div>

</main>

<script src="game.js"></script>

</body>
</html>
